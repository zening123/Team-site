            <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Архив: Легендарная Пятерка</title>
    <style>
        :root { --bg-color: #08090c; --accent-gold: #ffcc00; --cyber-pink: #ff0055; --cyber-blue: #00f0ff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); color: #fff; margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        /* Лоадер */
        #loader { position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; align-items: center; justify-content: center; color: var(--accent-gold); font-family: monospace; }
        
        /* Консоль логов */
        #console { position: fixed; bottom: 10px; right: 10px; width: 200px; height: 100px; background: rgba(0,0,0,0.8); border: 1px solid #333; font-size: 10px; padding: 5px; color: #0f0; overflow: hidden; pointer-events: none; z-index: 1000; }
        
        /* Основной стиль */
        .container { display: flex; flex-wrap: wrap; gap: 30px; justify-content: center; margin-top: 50px; }
        .card { background: #11161d; border: 1px solid rgba(255,204,0,0.1); border-radius: 16px; padding: 20px; width: 280px; text-align: center; transition: 0.3s; }
        .card img { width: 130px; height: 130px; border-radius: 50%; border: 3px solid var(--accent-gold); cursor: pointer; transition: 0.3s; }
        
        .shaking { animation: shake 0.4s infinite; }
        @keyframes shake { 0%{transform:translate(2px,2px)} 50%{transform:translate(-2px,-2px)} 100%{transform:translate(2px,2px)} }
        .glitch-mode { filter: invert(1) hue-rotate(180deg); animation: crazy-jump 0.1s infinite; }
        @keyframes crazy-jump { 0%{transform:translate(4px,-4px)} 100%{transform:translate(-4px,4px)} }
        
        #secret-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10000; flex-direction: column; align-items: center; justify-content: center; }
        .unlocked-container { display: none; gap: 15px; margin-top: 20px; }
        footer { margin-top: 50px; color: #444; cursor: pointer; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="loader">ИНИЦИАЛИЗАЦИЯ... 100%</div>
    <div id="console">Log: System Ready...</div>
    
    <audio id="sound-speed" src="speed.mp3"></audio>
    <audio id="sound-alarm" src="alarm.mp3"></audio>

    <header><h1 onclick="triggerShake()" style="color:var(--accent-gold); cursor:pointer;">Досье: Главные Лица</h1></header>
    
    <div class="container">
        <div class="card"><div class="avatar-container"><img src="artem.jpg" alt="Артём"></div><div class="name">Артём</div></div>
        <div class="card"><div class="avatar-container"><img src="slava.jpg" alt="Слава"></div><div class="name">Слава</div></div>
        <div class="card"><div class="avatar-container"><img src="timur.jpg" alt="Тимур" onclick="playSpeed()"></div><div class="name">Тимур</div></div>
        <div class="card"><div class="avatar-container"><img src="vanya.jpg" alt="Ваня" onclick="checkVanyaClicks()"></div><div class="name">Ваня</div></div>
        <div class="card"><div class="avatar-container"><img src="arsalan.jpg" alt="Арсалан" ondblclick="triggerChaos()"></div><div class="name">Арсалан</div></div>
        <div class="card" id="sanji-card"><div class="avatar-container"><img src="sanji.jpg" alt="Санжи"></div><div class="name">Санжи</div></div>
    </div>

    <div id="secret-overlay">
        <img id="trigger-image" src="vanya_secret.jpg" onclick="askPin()" style="max-width:80%; cursor:pointer;">
        <div class="unlocked-container" id="unlocked-pics">
            <img src="secret_1.jpg" width="100"><img src="secret_2.jpg" width="100"><img src="secret_3.jpg" width="100">
        </div>
    </div>

    <footer onclick="checkClicks()">Информация 2025Г.</footer>

    <script>
        window.onload = () => { setTimeout(() => document.getElementById('loader').style.display = 'none', 1500); }
        function addLog(msg) { const c = document.getElementById('console'); c.innerHTML += "<br>> " + msg; }
        
        let clickCount = 0; shakeCount = 0; vanyaClicks = 0;
        
        function playSpeed() { addLog("Speed trigger"); document.getElementById('sound-speed').play(); }
        function triggerShake() {
            if (++shakeCount === 5) {
                addLog("ALERT! Alarm activated.");
                document.getElementById('sound-alarm').play();
                document.querySelectorAll('.card').forEach(c => c.classList.add('shaking'));
                setTimeout(() => { document.querySelectorAll('.card').forEach(c => c.classList.remove('shaking')); shakeCount = 0; }, 3000);
            }
        }
        function triggerChaos() {
            addLog("CRITICAL ERROR: GLITCH");
            document.body.classList.add('glitch-mode');
            setTimeout(() => { document.body.classList.remove('glitch-mode'); }, 4000);
        }
        function checkClicks() { if (++clickCount === 3) document.getElementById('sanji-card').style.display = 'block'; }
        function checkVanyaClicks() { if (++vanyaClicks === 3) { document.getElementById('secret-overlay').style.display = 'flex'; vanyaClicks = 0; } }
        function askPin() { if (prompt("PIN:") === "1234") document.getElementById('unlocked-pics').style.display = 'flex'; }
    </script>

    <!-- 1MB BLOAT DATA -->
    <!-- 
       [ЗДЕСЬ НАЧИНАЕТСЯ ОГРОМНЫЙ МАССИВ ДАННЫХ ДЛЯ ВЕСА ФАЙЛА]
       Используем повторение символов для набора объема в 1 мегабайт... 
       (Это безопасно и не влияет на логику работы скриптов)
    -->
    <script>
        const bloat = "010101010101".repeat(80000); // Генерируем массив для веса
    </script>
</body>
</html>
